experiment_name: minisuperspace_frw_small_scale_factor
status: exploratory
official_experiment: false
scientific_question: >
  In a four-bin positive-scale-factor truncation of an FRW/Wheeler-DeWitt-inspired
  minisuperspace operator with a small-scale-factor inverse-square barrier term,
  what are the benchmark ground-state values of the retained scale-factor
  expectation, a volume proxy, and the smallest-bin occupation probability, and
  how accurately do exact local and noisy local quantum workflows reproduce
  them?
parameters:
  nearest_neighbor_tunneling: 0.1
  quadratic_potential_strength: 0.1
  inverse_square_barrier_strength: 0.001
truncation:
  basis: positive_scale_factor_bin_basis
  cutoff: 4
  bin_centers:
    - 0.15
    - 0.25
    - 0.4
    - 0.6
  rationale: >
    This exploratory refinement resolves the small positive-scale-factor sector
    more explicitly than the official two-bin baseline while remaining finite,
    exactly diagonalizable, and directly encodable on two qubits.
observables:
  - scale_factor_expectation_value
  - volume_expectation_value
  - effective_hamiltonian_expectation
  - smallest_scale_factor_probability
execution:
  exact_local:
    enabled: true
    backend_name: statevector_estimator
    precision: 0.0
  noisy_local:
    enabled: true
    backend_name: aer_estimator
    precision: 0.03
    seed: 424242
    options:
      backend_options:
        method: density_matrix
  ibm_hardware:
    enabled: false
    backend_name: null
    precision: 0.04
    optimization_level: 1
    options:
      selection_policy:
        strategy: explicit
        operational: true
        simulator: false
        min_num_qubits: 2
      mitigation_policy:
        resilience_level: 1
        measure_mitigation: true
        twirling_enable_measure: true
      runtime_options:
        environment:
          job_tags:
            - qclab
            - exploratory
            - minisuperspace_frw_small_scale_factor
            - ibm_runtime
model_variant: small_scale_factor_barrier
focus_bin_observable:
  index: 0
  name: smallest_scale_factor_probability
  physical_meaning: >
    Probability weight in the smallest retained positive-scale-factor bin of
    the exploratory four-bin truncation.
artifacts:
  benchmark_json: data/processed/minisuperspace_frw_small_scale_factor/benchmark.json
  exact_local_json: data/processed/minisuperspace_frw_small_scale_factor/exact_local.json
  exact_local_comparisons_json: data/processed/minisuperspace_frw_small_scale_factor/exact_local_comparisons.json
  noisy_local_json: data/processed/minisuperspace_frw_small_scale_factor/noisy_local.json
  noisy_local_comparisons_json: data/processed/minisuperspace_frw_small_scale_factor/noisy_local_comparisons.json
  ibm_runtime_json: data/processed/minisuperspace_frw_small_scale_factor/ibm_runtime.json
  ibm_runtime_comparisons_json: data/processed/minisuperspace_frw_small_scale_factor/ibm_runtime_comparisons.json
  ibm_runtime_metadata_json: data/raw/minisuperspace_frw_small_scale_factor/ibm_runtime_metadata.json
  ibm_runtime_report_markdown: results/reports/minisuperspace_frw_small_scale_factor/ibm_runtime_report.md
  analysis_summary_json: results/reports/minisuperspace_frw_small_scale_factor/analysis_summary.json
  analysis_report_markdown: results/reports/minisuperspace_frw_small_scale_factor/analysis_report.md
  observable_summary_table_markdown: results/tables/minisuperspace_frw_small_scale_factor/observable_summary.md
  comparison_figure: results/figures/minisuperspace_frw_small_scale_factor/observable_comparison.png
noise_model:
  one_qubit_depolarizing_probability: 0.004
  readout_error_probability: 0.02
  method: density_matrix
notes:
  - >
    This configuration is exploratory and is not an official new experiment
    line. It is a Track A refinement candidate within the existing
    minisuperspace program only.
  - >
    The Planck Epoch label is contextual only. This model does not constitute a
    literal simulation of the Planck Epoch or of full Planck-scale quantum
    gravity.
